# Eval case: a benign, deterministic browser workflow used to smoke-test capture + replay.
# Real demo workflows live in evals/cases/*.yaml — keep them parameterised and CSV-friendly.
name: google_search_basic
description: >
  Open a search engine, type a query, press enter, verify a results header is present.
target_kind: browser
start_url: https://duckduckgo.com/
params:
  query:
    type: string
    description: Search query string
    example: claude agents 2026
success_predicate:
  kind: dom
  selector: "[data-testid='mainline'], #links, main"
  must_be_visible: true
notes: |
  DuckDuckGo (not Google) chosen because it has no captcha for headless and stable selectors.
